name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build (Static Export for Pages)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_CUSTOM_DOMAIN: "true"
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Set custom domain
        run: echo "yangzhuo.uk" > out/CNAME

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
